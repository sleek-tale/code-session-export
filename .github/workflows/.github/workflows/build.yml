name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            asset: code-session-export-linux
            extra: ""
          - os: macos-latest
            name: macos
            asset: code-session-export-macos
            extra: ""
          - os: windows-latest
            name: windows
            asset: code-session-export-windows.exe
            extra: "--windowed"
          - os: windows-latest
            name: windows-console
            asset: code-session-export-windows-console.exe
            extra: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyinstaller

      - name: Build binary
        run: >
          pyinstaller --onefile --name ${{ matrix.asset }}
          --hidden-import tkinter
          --hidden-import tkinter.ttk
          --hidden-import tkinter.filedialog
          --hidden-import tkinter.messagebox
          ${{ matrix.extra }}
          code_session_export.py

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
